{% extends "base.html" %}

{% block title %}
<title>Patient Reports</title>
{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>All Patient Reports</h2>

    <table class="table mt-4">
        <thead>
            <tr>
                <th>Patient</th>
                <th>Report</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for report in reports %}
            <tr>
                <td>{{ report.patient.username }}</td>
                <td>
                    <a href="{{ report.report.url }}" class="btn btn-sm btn-primary">Download</a>
                </td>
                <td>{{ report.uploaded_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
